<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<title>Blindkarta – Gotlands socknar</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #0f2436;
    --sea: #1a3a56;
    --land: #cbbb96;
    --stroke: #5a4a32;
    --ink: #f4ecd8;
    --accent: #ffcc33;
    --correct: #ffffff;
    --second: #ffd84d;
    --third: #ff8ab5;
    --wrong: #e03a2f;
    --panel: #162a3d;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--ink);
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif; }
  .app { display: grid; grid-template-columns: 1fr 320px; height: 100vh; }
  @media (max-width: 760px) { .app { grid-template-columns: 1fr; grid-template-rows: 1fr auto; } }
  .map-wrap { position: relative; overflow: hidden; background: var(--sea); }
  svg { width: 100%; height: 100%; display: block; }
  .parish { fill: var(--land); stroke: var(--stroke); stroke-width: 0.6;
    cursor: pointer; transition: fill .15s; }
  .parish:hover { fill: #dcc9a2; }
  .parish.done-correct { fill: var(--correct); cursor: default; }
  .parish.done-second  { fill: var(--second);  cursor: default; }
  .parish.done-third   { fill: var(--third);   cursor: default; }
  .parish.done-wrong   { fill: var(--wrong);   cursor: default; }
  .parish.flash-bad   { fill: #ff7a6a !important; }
  .parish.flash-reveal { animation: flashReveal 1s steps(1, end) forwards; }
  @keyframes flashReveal {
    0%, 40%, 80% { fill: var(--land); }
    20%, 60%, 100% { fill: var(--wrong); }
  }
  .label { font-size: 10px; fill: #333; pointer-events: none;
    text-anchor: middle; dominant-baseline: central;
    paint-order: stroke; stroke: rgba(255,255,255,0.85); stroke-width: 2.5px;
    opacity: 0; transition: opacity .2s; }
  .label.revealed { opacity: 1; }

  .vapen { position: absolute; top: 14px; left: 14px; width: 74px; height: 90px;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.45)); pointer-events: none; }
  .vapen svg { width: 100%; height: 100%; display: block; }

  .credit { position: absolute; bottom: 10px; left: 14px; font-size: 11px;
    color: #c8d4e0; line-height: 1.4; text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    pointer-events: auto; }
  .credit a { color: var(--accent); text-decoration: none; }
  .credit a:hover { text-decoration: underline; }

  .wrong-popup { position: absolute; pointer-events: none;
    background: rgba(20,30,45,0.92); color: #fff; padding: 6px 12px;
    border-radius: 6px; font-size: 14px; font-weight: 600;
    border: 1px solid #ff7a6a;
    transform: translate(-50%, -120%); white-space: nowrap;
    opacity: 0; transition: opacity .15s; }
  .wrong-popup.show { opacity: 1; }

  .panel { background: var(--panel); padding: 20px; display: flex; flex-direction: column;
    gap: 16px; overflow-y: auto; border-left: 1px solid #0a1a28; }
  h1 { margin: 0; font-size: 18px; font-weight: 600; letter-spacing: 0.5px; color: var(--accent); }
  .prompt { background: #0f2030; border: 1px solid #2a4561; border-radius: 8px; padding: 18px 16px; text-align: center; }
  .prompt .label-small { font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; color: #8aa3bd; }
  .prompt .name { font-size: 30px; font-weight: 600; margin-top: 6px; line-height: 1.1; word-break: break-word; }
  .prompt .attempts { margin-top: 10px; display: flex; gap: 6px; justify-content: center; }
  .dot { width: 12px; height: 12px; border-radius: 50%; background: #2a4561; }
  .dot.used-correct { background: var(--correct); }
  .dot.used-second  { background: var(--second);  }
  .dot.used-third   { background: var(--third);   }
  .dot.used-wrong   { background: var(--wrong);   }

  .stats h2 { margin: 0 0 8px 0; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: #8aa3bd; font-weight: 600; }
  .stat-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px dashed #2a4561; font-size: 14px; }
  .stat-row:last-child { border-bottom: none; }
  .stat-row .k { color: #a8bdd3; }
  .stat-row .v { font-variant-numeric: tabular-nums; font-weight: 600; }
  .bar { height: 10px; background: #1a2f44; border-radius: 5px; overflow: hidden; display: flex; margin-top: 8px; }
  .bar > span { display: block; height: 100%; }
  .bar .b1 { background: var(--correct); }
  .bar .b2 { background: var(--second);  }
  .bar .b3 { background: var(--third);   }
  .bar .b4 { background: var(--wrong);   }

  .toggles { display: flex; flex-direction: column; gap: 8px; font-size: 13px; }
  .toggles label { display: flex; align-items: center; gap: 8px; cursor: pointer;
    color: #c8d4e0; user-select: none; }
  .toggles input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }

  #roads-layer path { fill: none; stroke: #d0201a; stroke-width: 1.0; stroke-linecap: round;
    stroke-linejoin: round; pointer-events: none; opacity: 0.9; }
  .roads-hidden #roads-layer { display: none; }
  #towns-layer circle { fill: #1ec85a; stroke: #0a3a18; stroke-width: 1.2;
    pointer-events: none; filter: drop-shadow(0 0 2px rgba(0,0,0,0.4)); }
  .towns-hidden #towns-layer { display: none; }

  .controls { display: flex; gap: 8px; }
  button { flex: 1; background: #233d57; color: var(--ink); border: 1px solid #33557a;
    border-radius: 6px; padding: 10px; font-size: 13px; cursor: pointer; }
  button:hover { background: #2b4c6e; }
  button.primary { background: var(--accent); color: #2a2000; border-color: var(--accent); font-weight: 600; }
  button.primary:hover { background: #ffd85c; }

  .done-banner { display: none; text-align: center; padding: 14px;
    background: #1e4a1e; border-radius: 8px; color: #d7ffd7; }
  .done-banner.show { display: block; }

  .legend { font-size: 11px; color: #8aa3bd; display: grid; grid-template-columns: auto 1fr; gap: 4px 8px; align-items: center; }
  .legend .sw { width: 14px; height: 14px; border-radius: 3px; border: 1px solid #33557a; }
</style>
</head>

<script>
(() => {
  const data = window.GOTLAND_DATA;
  const svg = document.getElementById("map");
  svg.setAttribute("viewBox", `0 0 ${data.width} ${data.height}`);

  const NS = "http://www.w3.org/2000/svg";
  const elements = new Map();   // name -> <path>
  const labels = new Map();     // name -> <text>

  // Layers: render order = paint order. Parishes at the bottom, then roads,
  // then town dots, then labels on top.
  const parishLayer = document.createElementNS(NS, "g"); parishLayer.setAttribute("id","parish-layer");
  const roadLayer   = document.createElementNS(NS, "g"); roadLayer.setAttribute("id","roads-layer");
  const townLayer   = document.createElementNS(NS, "g"); townLayer.setAttribute("id","towns-layer");
  const labelLayer  = document.createElementNS(NS, "g"); labelLayer.setAttribute("id","label-layer");
  svg.append(parishLayer, roadLayer, townLayer, labelLayer);

  for (const p of data.parishes) {
    const path = document.createElementNS(NS, "path");
    path.setAttribute("d", p.d);
    path.setAttribute("class", "parish");
    path.dataset.name = p.name;
    parishLayer.appendChild(path);

    const label = document.createElementNS(NS, "text");
    label.setAttribute("class", "label");
    label.setAttribute("x", p.cx);
    label.setAttribute("y", p.cy);
    label.textContent = p.name;
    labelLayer.appendChild(label);

    elements.set(p.name, path);
    labels.set(p.name, label);
  }

  // Link label visibility to its parish via a shared dataset name, because
  // parent tag no longer positions them as adjacent siblings.
  // (handled by toggling .done-* class on each label below in markDone())

  // Roads
  if (data.roads) {
    for (const d of data.roads) {
      const p = document.createElementNS(NS, "path");
      p.setAttribute("d", d);
      roadLayer.appendChild(p);
    }
  }
  // Towns
  if (data.towns) {
    for (const t of data.towns) {
      const c = document.createElementNS(NS, "circle");
      c.setAttribute("cx", t.x);
      c.setAttribute("cy", t.y);
      c.setAttribute("r", 3.5);
      townLayer.appendChild(c);
    }
  }

  // Checkbox wiring — toggles display of the layers via class on map-wrap.
  const mapWrap = svg.parentElement;
  mapWrap.classList.add("towns-hidden", "roads-hidden");
  document.getElementById("toggle-towns").addEventListener("change", e => {
    mapWrap.classList.toggle("towns-hidden", !e.target.checked);
  });
  document.getElementById("toggle-roads").addEventListener("change", e => {
    mapWrap.classList.toggle("roads-hidden", !e.target.checked);
  });

  // Game state
  const allNames = data.parishes.map(p => p.name);
  let queue = [];
  let current = null;
  let attempts = 0;           // 0, 1, or 2 wrong so far on current parish
  let stats;                  // {first, second, third, fail}

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function reset() {
    queue = shuffle(allNames);
    stats = { first: 0, second: 0, third: 0, fail: 0 };
    for (const el of elements.values()) {
      el.classList.remove("done-correct", "done-second", "done-third", "done-wrong", "flash-bad", "flash-reveal");
    }
    for (const lbl of labels.values()) {
      lbl.classList.remove("revealed");
    }
    document.getElementById("done-banner").classList.remove("show");
    next();
    renderStats();
  }

  function next() {
    current = queue.shift() || null;
    attempts = 0;
    renderPrompt();
    if (!current) finishGame();
  }

  function renderPrompt() {
    document.getElementById("current").textContent = current || "✓ Klart!";
    const container = document.getElementById("attempts");
    container.innerHTML = "";
    if (!current) return;
    for (let i = 0; i < 3; i++) {
      const dot = document.createElement("span");
      dot.className = "dot";
      container.appendChild(dot);
    }
  }

  function markAttemptDot(kind) {
    const dots = document.querySelectorAll("#attempts .dot");
    if (attempts - 1 < dots.length) dots[attempts - 1].classList.add("used-" + kind);
  }

  function renderStats() {
    const done = stats.first + stats.second + stats.third + stats.fail;
    document.getElementById("s-total").textContent = `${done} / ${allNames.length}`;
    const pct = n => done ? Math.round(100 * n / done) : 0;
    document.getElementById("s-first").textContent  = `${stats.first} (${pct(stats.first)} %)`;
    document.getElementById("s-second").textContent = `${stats.second} (${pct(stats.second)} %)`;
    document.getElementById("s-third").textContent  = `${stats.third} (${pct(stats.third)} %)`;
    document.getElementById("s-fail").textContent   = `${stats.fail} (${pct(stats.fail)} %)`;
    const total = done || 1;
    document.getElementById("bar1").style.width = (100 * stats.first  / total) + "%";
    document.getElementById("bar2").style.width = (100 * stats.second / total) + "%";
    document.getElementById("bar3").style.width = (100 * stats.third  / total) + "%";
    document.getElementById("bar4").style.width = (100 * stats.fail   / total) + "%";
  }

  function finishGame() {
    const banner = document.getElementById("done-banner");
    const total = stats.first + stats.second + stats.third + stats.fail;
    const pct = Math.round(100 * stats.first / total);
    banner.textContent = `Klar! ${stats.first} av ${total} rätt på första försöket (${pct} %).`;
    banner.classList.add("show");
  }

  function onClick(ev) {
    if (!current) return;
    const path = ev.target.closest("path.parish");
    if (!path) return;
    // ignore clicks on already solved parishes
    if (path.classList.contains("done-correct") ||
        path.classList.contains("done-second")  ||
        path.classList.contains("done-third")   ||
        path.classList.contains("done-wrong")) return;

    attempts++;
    const clicked = path.dataset.name;
    const correct = clicked === current;
    const target = elements.get(current);

    if (correct) {
      if (attempts === 1)      { target.classList.add("done-correct"); stats.first++;  markAttemptDot("correct"); }
      else if (attempts === 2) { target.classList.add("done-second");  stats.second++; markAttemptDot("correct"); }
      else                     { target.classList.add("done-third");   stats.third++;  markAttemptDot("correct"); }
      labels.get(current).classList.add("revealed");
      renderStats();
      setTimeout(next, 450);
      return;
    }

    // wrong click — flash the wrong parish and show its name for 1s
    path.classList.add("flash-bad");
    setTimeout(() => path.classList.remove("flash-bad"), 280);
    showWrongPopup(path, clicked);

    if (attempts < 3) {
      markAttemptDot(attempts === 1 ? "second" : "third");
    } else {
      // last attempt used; flash the correct parish red for 1s, then lock it in
      stats.fail++;
      markAttemptDot("wrong");
      renderStats();
      target.classList.add("flash-reveal");
      const revealed = current;
      setTimeout(() => {
        target.classList.remove("flash-reveal");
        target.classList.add("done-wrong");
        labels.get(revealed).classList.add("revealed");
        next();
      }, 1000);
    }
  }

  let wrongPopupTimer = null;
  function showWrongPopup(path, name) {
    const popup = document.getElementById("wrong-popup");
    const wrap = svg.parentElement;
    const wrapRect = wrap.getBoundingClientRect();
    const pathRect = path.getBoundingClientRect();
    const x = pathRect.left - wrapRect.left + pathRect.width / 2;
    const y = pathRect.top  - wrapRect.top  + pathRect.height / 2;
    popup.style.left = x + "px";
    popup.style.top  = y + "px";
    popup.textContent = name;
    popup.classList.add("show");
    clearTimeout(wrongPopupTimer);
    wrongPopupTimer = setTimeout(() => popup.classList.remove("show"), 1000);
  }

  svg.addEventListener("click", onClick);

  document.getElementById("restart").addEventListener("click", reset);
  document.getElementById("skip").addEventListener("click", () => {
    if (!current) return;
    const target = elements.get(current);
    target.classList.add("done-wrong");
    labels.get(current).classList.add("revealed");
    stats.fail++;
    renderStats();
    setTimeout(next, 400);
  });

  reset();
})();
</script>
